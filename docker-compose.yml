services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: insightflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insightflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/insightflow
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      HF_HOME: /app/model-cache
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - model_cache:/app/model-cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  model_cache:
